<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="500" viewBox="0 0 1160 500" role="img" aria-labelledby="title desc">
  <title id="title">AscensionAI worker launch demo</title>
  <desc id="desc">Animated SVG showing three rollout workers producing files, an offline trainer consuming them, and a checkpoint updating.</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .box { fill: #fff; stroke: #c9d2df; stroke-width: 2; rx: 8; }
      .worker { fill: #eef6ff; stroke: #1d5f99; stroke-width: 2; rx: 8; }
      .trainer { fill: #eefaf2; stroke: #247a3d; stroke-width: 2; rx: 8; }
      .checkpoint { fill: #fff7e8; stroke: #9b640b; stroke-width: 2; rx: 8; }
      .label { font: 700 16px Arial, sans-serif; fill: #111827; }
      .small { font: 13px Arial, sans-serif; fill: #4b5563; }
      .mono { font: 13px Consolas, monospace; fill: #17202a; }
      .line { stroke: #374151; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dot { fill: #1d5f99; opacity: 0; }
      .flash { opacity: 0.3; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
  </defs>
  <rect class="bg" width="1160" height="500"/>
  <text class="label" x="40" y="42">Rollout workers -> shared queue -> PPO trainer -> checkpoint reload</text>

  <rect class="worker" x="48" y="92" width="220" height="78"/>
  <text class="label" x="70" y="124">Worker 1</text>
  <text class="small" x="70" y="150">game -> rollout file</text>
  <rect class="worker" x="48" y="205" width="220" height="78"/>
  <text class="label" x="70" y="237">Worker 2</text>
  <text class="small" x="70" y="263">game -> rollout file</text>
  <rect class="worker" x="48" y="318" width="220" height="78"/>
  <text class="label" x="70" y="350">Worker 3</text>
  <text class="small" x="70" y="376">game -> rollout file</text>

  <rect class="box" x="392" y="164" width="250" height="160"/>
  <text class="label" x="418" y="198">rollouts_shared/</text>
  <text class="mono" x="418" y="230">w1_g54_*.npz</text>
  <text class="mono" x="418" y="258">w2_g47_*.npz</text>
  <text class="mono" x="418" y="286">w3_g51_*.npz</text>

  <rect class="trainer" x="754" y="164" width="250" height="160"/>
  <text class="label" x="780" y="198">Offline Trainer</text>
  <text class="small" x="780" y="228">batch: 8 games</text>
  <text class="small" x="780" y="254">update: #19</text>
  <text class="small" x="780" y="280">stale_total: 0</text>

  <rect class="checkpoint" x="754" y="386" width="250" height="70"/>
  <text class="label" x="780" y="418">models/ppo_sts.pt</text>
  <text class="small" x="780" y="442">atomic checkpoint save</text>

  <path class="line" d="M268 131 C320 131 330 199 392 222"/>
  <path class="line" d="M268 244 L392 244"/>
  <path class="line" d="M268 357 C320 357 330 289 392 266"/>
  <path class="line" d="M642 244 L754 244"/>
  <path class="line" d="M879 324 L879 386"/>
  <path class="line" d="M754 421 C610 470 250 454 158 396"/>

  <circle class="dot" cx="284" cy="151" r="8">
    <animate attributeName="opacity" values="0;1;0" dur="2.4s" repeatCount="indefinite" begin="0s"/>
    <animateMotion dur="2.4s" repeatCount="indefinite" path="M0,0 C80,0 92,68 170,88"/>
  </circle>
  <circle class="dot" cx="284" cy="244" r="8">
    <animate attributeName="opacity" values="0;1;0" dur="2.4s" repeatCount="indefinite" begin="0.35s"/>
    <animateMotion dur="2.4s" repeatCount="indefinite" begin="0.35s" path="M0,0 L170,0"/>
  </circle>
  <circle class="dot" cx="284" cy="337" r="8">
    <animate attributeName="opacity" values="0;1;0" dur="2.4s" repeatCount="indefinite" begin="0.7s"/>
    <animateMotion dur="2.4s" repeatCount="indefinite" begin="0.7s" path="M0,0 C80,0 92,-68 170,-88"/>
  </circle>
  <circle class="dot" cx="656" cy="244" r="8" fill="#247a3d">
    <animate attributeName="opacity" values="0;1;0" dur="2.2s" repeatCount="indefinite" begin="1.2s"/>
    <animateMotion dur="2.2s" repeatCount="indefinite" begin="1.2s" path="M0,0 L92,0"/>
  </circle>
  <rect class="flash" x="754" y="386" width="250" height="70" rx="8" fill="#9b640b">
    <animate attributeName="opacity" values="0;0;0.28;0" dur="3s" repeatCount="indefinite" begin="1.8s"/>
  </rect>

  <text class="mono" x="48" y="456">15:11:37 Loading 8 new game files... Running PPO update on 1444 transitions... checkpoint saved.</text>
</svg>
